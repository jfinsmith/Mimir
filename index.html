<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MIMIR — a searchable catalog of watch movements and a fitment engine that tells hobbyist watchmakers which cases, dials, hands and crystals actually fit."
    />
    <title>MIMIR · Watch Movement Catalog & Fitment Engine</title>
    <!--
      SPA deep-link restore (pairs with public/404.html). GitHub Pages serves
      404.html for unknown paths; that page encodes the path into a query string
      and redirects here, where this snippet decodes it back before the router
      mounts. Lets /movement/seiko-nh35 survive a hard refresh.
    -->
    <script type="text/javascript">
      (function () {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
