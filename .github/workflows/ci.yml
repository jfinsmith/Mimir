name: CI

on:
  pull_request:
  push:
    branches-ignore: [main] # main is built + deployed by deploy.yml

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run validate:data
      - run: npm test
      - run: npm run build
